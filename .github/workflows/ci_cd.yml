name: CI/CD — Protein Solubility API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── JOB 1 : Tests unitaires ──────────────────────────────────
  test:
    name: Tests unitaires & couverture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installation des dépendances
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn pydantic pytest pytest-cov httpx \
                      lightgbm scikit-learn numpy joblib

      - name: Création d'un modèle de test
        run: |
          mkdir -p model
          python -c "
          import joblib, numpy as np
          from sklearn.dummy import DummyClassifier
          model = DummyClassifier(strategy='stratified', random_state=42)
          X = np.random.rand(100, 13)
          y = np.random.randint(0, 2, 100)
          model.fit(X, y)
          joblib.dump(model, 'model/lgbm_model.joblib')
          print('Modèle de test créé')
          "

      - name: Exécution des tests avec couverture
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload rapport de couverture
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── JOB 2 : Build Docker ─────────────────────────────────────
  build:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Création d'un modèle factice pour le build
        run: |
          mkdir -p model
          pip install joblib scikit-learn numpy
          python3 -c "
          import joblib, numpy as np
          from sklearn.dummy import DummyClassifier
          model = DummyClassifier(strategy='stratified', random_state=42)
          X = np.random.rand(100, 13)
          y = np.random.randint(0, 2, 100)
          model.fit(X, y)
          joblib.dump(model, 'model/lgbm_model.joblib')
          print('Modèle de test créé')
          "

      - name: Build de l'image Docker
        run: |
          docker build -t protein-solubility-api:${{ github.sha }} .
          docker build -t protein-solubility-api:latest .

      - name: Test de l'image Docker
        run: |
          docker run -d --name test-api -p 8000:8000 protein-solubility-api:latest
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop test-api
          docker rm test-api
          echo "Image Docker validée"

  # ── JOB 3 : Déploiement sur Hugging Face Spaces ─────────────
  deploy:
    name: Déploiement Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installation huggingface-hub
        run: pip install huggingface-hub

      - name: Déploiement sur Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          token = os.environ.get('HF_TOKEN')
          if not token:
              print('HF_TOKEN non configuré — déploiement ignoré')
              exit(0)
          api = HfApi()
          api.upload_folder(
              folder_path='.',
              repo_id='fatimaadda2878/protein-solubility-api',
              repo_type='space',
              token=token,
              ignore_patterns=['*.pyc', '__pycache__', '.git', 'logs']
          )
          print('Déployé sur Hugging Face Spaces')
          "
